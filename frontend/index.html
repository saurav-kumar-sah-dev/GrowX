<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GrowX - Your Career Growth Platform. Find jobs, internships, build resumes, and ace your interviews with AI-powered tools." />
    <meta name="keywords" content="jobs, internships, resume builder, ATS checker, quiz, career growth, interview preparation" />
    <meta name="author" content="GrowX" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="GrowX - Career Growth Platform" />
    <meta property="og:description" content="Find jobs, internships, build resumes, and ace your interviews with AI-powered tools." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>GrowX - Career Growth Platform</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #0A0A0F;
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
        width: 100%;
      }
      .loader-container {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0A0A0F;
        padding: 20px;
      }
      .loader {
        width: 50px;
        height: 50px;
        border: 3px solid #1A1A24;
        border-top: 3px solid #D4A853;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(212,168,83,0.3);
      }
      .loader-text {
        margin-top: 20px;
        color: #F5F0E6;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .loader-sub {
        margin-top: 8px;
        color: #A8A099;
        font-size: 14px;
        text-align: center;
      }
      .loader-dots::after {
        content: '';
        animation: dots 1.5s infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
      }
      @media (max-width: 480px) {
        .loader {
          width: 40px;
          height: 40px;
        }
        .loader-text {
          font-size: 20px;
        }
        .loader-sub {
          font-size: 12px;
        }
      }
      /* Hide loader once React mounts */
      body.react-loaded .loader-container { 
        display: none; 
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="loader"></div>
        <p class="loader-text">GrowX</p>
        <p class="loader-sub">Loading<span class="loader-dots"></span></p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.body.classList.add('react-loaded');
        }, 1500);
      });
    </script>
  </body>
</html>
