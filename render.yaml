# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set FRONTEND_URL to your service URL (e.g. https://growx.onrender.com) for CORS.
#
# Google login: Login/Signup use Firebase Auth. Vite embeds VITE_FIREBASE_* at BUILD time — add every
# VITE_FIREBASE_* below in the Render dashboard (same values as Firebase Console → Project settings → Your apps).
# Also add your *.onrender.com domain under Firebase → Authentication → Settings → Authorized domains.

services:
  - type: web
    name: growx
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
